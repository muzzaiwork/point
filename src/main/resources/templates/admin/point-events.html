<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Admin - 포인트 이벤트 이력</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; color: #333; }
        header { background: #1a1a2e; color: #fff; padding: 16px 32px; display: flex; align-items: center; gap: 24px; }
        header h1 { font-size: 1.2rem; font-weight: 600; }
        nav a { color: #aac4ff; text-decoration: none; font-size: 0.9rem; padding: 6px 14px; border-radius: 4px; }
        nav a:hover, nav a.active { background: #16213e; color: #fff; }
        .container { max-width: 1200px; margin: 32px auto; padding: 0 24px; }
        .page-title { font-size: 1.1rem; font-weight: 600; color: #1a1a2e; margin-bottom: 4px; }
        .page-sub { font-size: 0.85rem; color: #666; margin-bottom: 20px; }
        .page-sub code { font-family: monospace; background: #e9ecef; padding: 2px 6px; border-radius: 4px; color: #1a1a2e; }

        .back-link { display: inline-block; margin-bottom: 16px; font-size: 0.85rem; color: #3b5bdb; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }

        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        thead { background: #1a1a2e; color: #fff; }
        th { padding: 11px 14px; text-align: left; font-size: 0.8rem; font-weight: 500; white-space: nowrap; }
        td { padding: 11px 14px; font-size: 0.84rem; border-bottom: 1px solid #f0f0f0; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8f9ff; }
        .num { text-align: right; font-variant-numeric: tabular-nums; }

        .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.74rem; font-weight: 700; }
        .badge-accumulate    { background: #ebfbee; color: #2f9e44; }
        .badge-use           { background: #e7f5ff; color: #1971c2; }
        .badge-cancel        { background: #fff0f0; color: #e03131; }
        .badge-expire        { background: #f3f0ff; color: #6741d9; }
        .badge-auto-restored { background: #fff0f6; color: #c2255c; }
        .badge-use-cancel    { background: #fff9db; color: #e67700; }

        .empty { text-align: center; color: #999; padding: 48px; }
        code { font-family: monospace; font-size: 0.8rem; color: #555; }

        .no-pointkey { text-align: center; padding: 60px; color: #999; font-size: 0.95rem; }
    </style>
</head>
<body>
<header>
    <h1>🛠 Point Admin</h1>
    <nav>
        <a href="/admin/accounts">사용자 계정</a>
        <a href="/admin/points" class="active">포인트 적립 내역</a>
        <a href="/admin/orders">포인트 사용 내역</a>
    </nav>
</header>

<div class="container">
    <a href="/admin/points" class="back-link">← 포인트 적립 내역으로 돌아가기</a>

    <div class="page-title">포인트 이벤트 이력</div>
    <div class="page-sub" th:if="${pointKey != null}">
        pointKey: <code th:text="${pointKey}"></code>
    </div>

    <div th:if="${pointKey == null or pointKey.isBlank()}" class="no-pointkey">
        pointKey를 지정해 주세요.
    </div>

    <div th:if="${pointKey != null and !pointKey.isBlank()}">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>이벤트 타입</th>
                    <th class="num">금액</th>
                    <th>주문번호 (orderNo)</th>
                    <th>취소 ID</th>
                    <th>발생일시</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="e, stat : ${events}">
                    <td th:text="${stat.index + 1}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${e.pointEventType.name() == 'ACCUMULATE'} ? 'badge-accumulate'
                                           : (${e.pointEventType.name() == 'USE'} ? 'badge-use'
                                           : (${e.pointEventType.name() == 'CANCEL'} ? 'badge-cancel'
                                           : (${e.pointEventType.name() == 'EXPIRE'} ? 'badge-expire'
                                           : (${e.pointEventType.name() == 'AUTO_RESTORED'} ? 'badge-auto-restored'
                                           : 'badge-use-cancel'))))"
                              th:text="${e.pointEventType.name()}"></span>
                    </td>
                    <td class="num" th:text="${#numbers.formatInteger(e.amount, 1, 'COMMA')}"></td>
                    <td><code th:text="${e.order != null ? e.order.orderNo : '-'}"></code></td>
                    <td th:text="${e.orderCancel != null ? e.orderCancel.id : '-'}"></td>
                    <td th:text="${#temporals.format(e.regDateTime, 'yyyy-MM-dd HH:mm:ss')}"></td>
                </tr>
                <tr th:if="${events == null or #lists.isEmpty(events)}">
                    <td colspan="6" class="empty">이벤트 이력이 없습니다.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
