<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포인트 Admin - 일별 집계</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f6fa; color: #333; }
        .nav { background: #1a1a2e; padding: 0 24px; display: flex; align-items: center; gap: 0; }
        .nav-brand { color: #e94560; font-weight: 700; font-size: 18px; padding: 16px 24px 16px 0; border-right: 1px solid #333; margin-right: 8px; }
        .nav a { color: #aaa; text-decoration: none; padding: 16px 16px; display: inline-block; font-size: 14px; transition: color 0.2s; }
        .nav a:hover, .nav a.active { color: #fff; border-bottom: 2px solid #e94560; }
        .container { max-width: 1100px; margin: 32px auto; padding: 0 24px; }
        h2 { font-size: 20px; margin-bottom: 20px; color: #1a1a2e; }
        .search-box { background: #fff; border-radius: 8px; padding: 20px 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .search-box label { font-size: 13px; color: #666; margin-right: 4px; }
        .search-box input[type=date] { padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
        .search-box input[type=date]:focus { border-color: #e94560; }
        .search-box button { padding: 10px 24px; background: #e94560; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
        .search-box button:hover { background: #c73652; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        thead { background: #1a1a2e; color: #fff; }
        thead th { padding: 12px 16px; text-align: left; font-weight: 500; }
        tbody tr { border-bottom: 1px solid #f0f0f0; }
        tbody tr:hover { background: #fafafa; }
        tbody td { padding: 12px 16px; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .badge-ACCUMULATE { background: #e8f5e9; color: #2e7d32; }
        .badge-ACCUMULATE_CANCEL { background: #fce4ec; color: #c62828; }
        .badge-USE { background: #e3f2fd; color: #1565c0; }
        .badge-USE_CANCEL { background: #fff3e0; color: #e65100; }
        .badge-EXPIRE { background: #f3e5f5; color: #6a1b9a; }
        .badge-AUTO_RESTORED { background: #e0f7fa; color: #00695c; }
        .empty { text-align: center; padding: 48px; color: #aaa; font-size: 15px; }
        .amount { font-weight: 600; color: #1a1a2e; }
    </style>
</head>
<body>
<nav class="nav">
    <span class="nav-brand">🎯 Point Admin</span>
    <a th:href="@{/admin/user-history}">사용자별 이력</a>
    <a th:href="@{/admin/point-history}">포인트 건별 이력</a>
    <a th:href="@{/admin/daily}" class="active">일별 집계 (정산)</a>
</nav>
<div class="container">
    <h2>일별 집계 (정산용)</h2>
    <div class="search-box">
        <form th:action="@{/admin/daily}" method="get" style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;">
            <div>
                <label>시작일</label>
                <input type="date" name="startDate" th:value="${startDate}" />
            </div>
            <div>
                <label>종료일</label>
                <input type="date" name="endDate" th:value="${endDate}" />
            </div>
            <button type="submit">조회</button>
        </form>
    </div>
    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>날짜</th>
                    <th>이벤트 타입</th>
                    <th>합계 금액</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${aggregation == null or aggregation.isEmpty()}">
                    <td colspan="3" class="empty">조회된 집계 데이터가 없습니다.</td>
                </tr>
                <tr th:each="row : ${aggregation}">
                    <td th:text="${row.date}"></td>
                    <td>
                        <span class="badge" th:classappend="'badge-' + ${row.pointEventType}" th:text="${row.pointEventType}"></span>
                    </td>
                    <td class="amount" th:text="${#numbers.formatInteger(row.totalAmount, 0, 'COMMA') + 'P'}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
