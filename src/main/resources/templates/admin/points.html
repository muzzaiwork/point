<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Admin - 포인트 적립 내역</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; color: #333; }
        header { background: #1a1a2e; color: #fff; padding: 16px 32px; display: flex; align-items: center; gap: 24px; }
        header h1 { font-size: 1.2rem; font-weight: 600; }
        nav a { color: #aac4ff; text-decoration: none; font-size: 0.9rem; padding: 6px 14px; border-radius: 4px; }
        nav a:hover, nav a.active { background: #16213e; color: #fff; }
        .container { max-width: 1400px; margin: 32px auto; padding: 0 24px; }
        .page-title { font-size: 1.1rem; font-weight: 600; color: #1a1a2e; margin-bottom: 16px; }

        /* 검색 폼 */
        .search-card { background: #fff; border-radius: 10px; padding: 20px 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .search-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; align-items: end; }
        .field label { display: block; font-size: 0.75rem; font-weight: 600; color: #555; margin-bottom: 4px; }
        .field input, .field select {
            width: 100%; padding: 7px 10px; border: 1px solid #d0d7de; border-radius: 6px;
            font-size: 0.85rem; background: #fafafa; color: #333;
        }
        .field input:focus, .field select:focus { outline: none; border-color: #3b5bdb; background: #fff; }
        .btn-row { display: flex; gap: 8px; align-items: flex-end; }
        .btn { padding: 7px 18px; border: none; border-radius: 6px; font-size: 0.85rem; cursor: pointer; font-weight: 500; }
        .btn-primary { background: #3b5bdb; color: #fff; }
        .btn-primary:hover { background: #1c3faa; }
        .btn-reset { background: #e9ecef; color: #495057; }
        .btn-reset:hover { background: #dee2e6; }

        /* 결과 요약 */
        .result-summary { font-size: 0.85rem; color: #666; margin-bottom: 10px; }
        .result-summary strong { color: #1a1a2e; }

        /* 테이블 */
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        thead { background: #1a1a2e; color: #fff; }
        th { padding: 11px 14px; text-align: left; font-size: 0.8rem; font-weight: 500; white-space: nowrap; }
        td { padding: 11px 14px; font-size: 0.84rem; border-bottom: 1px solid #f0f0f0; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8f9ff; }
        .num { text-align: right; font-variant-numeric: tabular-nums; }

        /* 뱃지 */
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.74rem; font-weight: 600; }
        .badge-free { background: #e7f5ff; color: #1971c2; }
        .badge-paid { background: #fff3bf; color: #e67700; }
        .badge-manual { background: #f3f0ff; color: #6741d9; }
        .badge-accumulation { background: #ebfbee; color: #2f9e44; }
        .badge-auto-restored { background: #fff0f6; color: #c2255c; }

        /* 상태 */
        .status-cancelled { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.74rem; font-weight: 700; background: #fff0f0; color: #e03131; }
        .status-active    { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.74rem; font-weight: 700; background: #ebfbee; color: #2f9e44; }

        .empty { text-align: center; color: #999; padding: 48px; }
        code { font-family: monospace; font-size: 0.8rem; color: #555; }

        /* 모달 */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: #fff; border-radius: 12px; width: 90%; max-width: 760px; max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
        .modal-header { padding: 18px 24px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
        .modal-header h2 { font-size: 1rem; font-weight: 600; color: #1a1a2e; }
        .modal-header .modal-key { font-family: monospace; font-size: 0.85rem; color: #3b5bdb; margin-left: 8px; }
        .modal-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #888; line-height: 1; }
        .modal-close:hover { color: #333; }
        .modal-body { overflow-y: auto; padding: 20px 24px; }
        .modal-body table { width: 100%; border-collapse: collapse; }
        .modal-body th { background: #f4f6f9; padding: 9px 12px; font-size: 0.78rem; font-weight: 600; color: #555; text-align: left; border-bottom: 1px solid #e0e0e0; }
        .modal-body td { padding: 9px 12px; font-size: 0.82rem; border-bottom: 1px solid #f0f0f0; }
        .modal-body tr:last-child td { border-bottom: none; }
        .modal-empty { text-align: center; color: #999; padding: 32px; font-size: 0.9rem; }

        /* 이벤트 타입 뱃지 */
        .badge-accumulate  { background: #ebfbee; color: #2f9e44; }
        .badge-use         { background: #e7f5ff; color: #1971c2; }
        .badge-cancel      { background: #fff0f0; color: #e03131; }
        .badge-expire      { background: #f3f0ff; color: #6741d9; }
        .badge-auto-restored-ev { background: #fff0f6; color: #c2255c; }
    </style>
</head>
<body>
<header>
    <h1>🛠 Point Admin</h1>
    <nav>
        <a href="/admin/accounts">사용자 계정</a>
        <a href="/admin/points" class="active">포인트 적립 내역</a>
        <a href="/admin/orders">포인트 사용 내역</a>
    </nav>
</header>

<div class="container">
    <div class="page-title">포인트 적립 내역</div>

    <!-- 검색 폼 -->
    <div class="search-card">
        <form method="get" action="/admin/points">
            <div class="search-grid">
                <div class="field">
                    <label>사용자 ID</label>
                    <input type="text" name="userId" placeholder="userId" th:value="${userId}"/>
                </div>
                <div class="field">
                    <label>상태</label>
                    <select name="status">
                        <option value="">전체</option>
                        <option value="active"   th:selected="${status == 'active'}">적립</option>
                        <option value="cancelled" th:selected="${status == 'cancelled'}">취소</option>
                    </select>
                </div>
                <div class="field">
                    <label>포인트 타입</label>
                    <select name="type">
                        <option value="">전체</option>
                        <option value="FREE" th:selected="${type == 'FREE'}">FREE</option>
                        <option value="PAID" th:selected="${type == 'PAID'}">PAID</option>
                    </select>
                </div>
                <div class="field">
                    <label>적립 출처</label>
                    <select name="sourceType">
                        <option value="">전체</option>
                        <option value="ACCUMULATION"   th:selected="${sourceType == 'ACCUMULATION'}">ACCUMULATION</option>
                        <option value="MANUAL"        th:selected="${sourceType == 'MANUAL'}">MANUAL</option>
                        <option value="AUTO_RESTORED" th:selected="${sourceType == 'AUTO_RESTORED'}">AUTO_RESTORED</option>
                    </select>
                </div>
                <div class="field">
                    <label>만료일 시작</label>
                    <input type="date" name="startDate" th:value="${startDate}"/>
                </div>
                <div class="field">
                    <label>만료일 종료</label>
                    <input type="date" name="endDate" th:value="${endDate}"/>
                </div>
                <div class="field btn-row">
                    <button type="submit" class="btn btn-primary">조회</button>
                    <a href="/admin/points" class="btn btn-reset">초기화</a>
                </div>
            </div>
        </form>
    </div>

    <!-- 결과 요약 -->
    <div class="result-summary" th:if="${points != null}">
        총 <strong th:text="${#lists.size(points)}">0</strong>건
    </div>

    <!-- 테이블 -->
    <table>
        <thead>
            <tr>
                <th>pointKey</th>
                <th>사용자 ID</th>
                <th>타입</th>
                <th>출처</th>
                <th>orderNo</th>
                <th class="num">적립 금액</th>
                <th class="num">잔여 금액</th>
                <th>만료일</th>
                <th>상태</th>
                <th>등록일시</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${points}">
                <td><a href="#" class="point-key-link" th:attr="data-key=${p.pointKey}" style="color:#3b5bdb;text-decoration:none;font-family:monospace;font-size:0.8rem;" th:text="${p.pointKey}"></a></td>
                <td th:text="${p.userId}"></td>
                <td>
                    <span class="badge"
                          th:classappend="${p.type.name() == 'PAID'} ? 'badge-paid' : 'badge-free'"
                          th:text="${p.type.name()}"></span>
                </td>
                <td>
                    <span class="badge"
                          th:classappend="${p.pointSourceType.name() == 'MANUAL'} ? 'badge-manual' : (${p.pointSourceType.name() == 'AUTO_RESTORED'} ? 'badge-auto-restored' : 'badge-accumulation')"
                          th:text="${p.pointSourceType.name()}"></span>
                </td>
                <td><code th:text="${p.orderNo != null ? p.orderNo : '-'}"></code></td>
                <td class="num" th:text="${#numbers.formatInteger(p.accumulatedPoint, 1, 'COMMA')}"></td>
                <td class="num" th:text="${#numbers.formatInteger(p.remainingPoint, 1, 'COMMA')}"></td>
                <td th:text="${#temporals.format(p.expiryDate, 'yyyy-MM-dd')}"></td>
                <td>
                    <span th:if="${p.cancelled}"  class="status-cancelled">취소</span>
                    <span th:if="${!p.cancelled}" class="status-active">적립</span>
                </td>
                <td th:text="${#temporals.format(p.regDateTime, 'yyyy-MM-dd HH:mm')}"></td>
            </tr>
            <tr th:if="${points == null or #lists.isEmpty(points)}">
                <td colspan="10" class="empty">조회된 내역이 없습니다.</td>
            </tr>
        </tbody>
    </table>
</div>

<!-- 이벤트 이력 모달 -->
<div class="modal-overlay" id="eventModal">
    <div class="modal">
        <div class="modal-header">
            <h2>포인트 이벤트 이력 <span class="modal-key" id="modalPointKey"></span></h2>
            <button class="modal-close" id="modalClose">&times;</button>
        </div>
        <div class="modal-body">
            <div id="modalContent"><p class="modal-empty">로딩 중...</p></div>
        </div>
    </div>
</div>

<script>
    const eventTypeLabel = {
        ACCUMULATE: { label: 'ACCUMULATE', cls: 'badge-accumulate' },
        USE:        { label: 'USE',        cls: 'badge-use' },
        CANCEL:     { label: 'CANCEL',     cls: 'badge-cancel' },
        EXPIRE:     { label: 'EXPIRE',     cls: 'badge-expire' },
        AUTO_RESTORED: { label: 'AUTO_RESTORED', cls: 'badge-auto-restored-ev' }
    };

    document.querySelectorAll('.point-key-link').forEach(link => {
        link.addEventListener('click', e => {
            e.preventDefault();
            const pointKey = link.dataset.key;
            openModal(pointKey);
        });
    });

    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('eventModal').addEventListener('click', e => {
        if (e.target === document.getElementById('eventModal')) closeModal();
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    function openModal(pointKey) {
        document.getElementById('modalPointKey').textContent = pointKey;
        document.getElementById('modalContent').innerHTML = '<p class="modal-empty">로딩 중...</p>';
        document.getElementById('eventModal').classList.add('open');

        fetch('/admin/point-events?pointKey=' + encodeURIComponent(pointKey))
            .then(r => r.json())
            .then(data => renderModal(data))
            .catch(() => {
                document.getElementById('modalContent').innerHTML = '<p class="modal-empty">데이터를 불러오지 못했습니다.</p>';
            });
    }

    function closeModal() {
        document.getElementById('eventModal').classList.remove('open');
    }

    function renderModal(events) {
        if (!events || events.length === 0) {
            document.getElementById('modalContent').innerHTML = '<p class="modal-empty">이벤트 이력이 없습니다.</p>';
            return;
        }
        let html = '<table><thead><tr><th>#</th><th>이벤트 타입</th><th style="text-align:right">금액</th><th>주문번호</th><th>취소 ID</th><th>발생일시</th></tr></thead><tbody>';
        events.forEach((ev, i) => {
            const t = eventTypeLabel[ev.pointEventType] || { label: ev.pointEventType, cls: '' };
            const amt = Number(ev.amount).toLocaleString();
            const orderNo = ev.orderNo || '-';
            const cancelId = ev.orderCancelId || '-';
            const dt = ev.regDateTime ? ev.regDateTime.replace('T', ' ').substring(0, 16) : '-';
            html += `<tr>
                <td style="color:#999;font-size:0.75rem">${i + 1}</td>
                <td><span class="badge ${t.cls}">${t.label}</span></td>
                <td style="text-align:right;font-variant-numeric:tabular-nums">${amt}</td>
                <td><code>${orderNo}</code></td>
                <td style="color:#999;font-size:0.78rem">${cancelId}</td>
                <td style="color:#555;font-size:0.8rem">${dt}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('modalContent').innerHTML = html;
    }
</script>
</body>
</html>
