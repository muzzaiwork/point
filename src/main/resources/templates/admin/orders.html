<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Admin - 포인트 사용 내역</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; color: #333; }
        header { background: #1a1a2e; color: #fff; padding: 16px 32px; display: flex; align-items: center; gap: 24px; }
        header h1 { font-size: 1.2rem; font-weight: 600; }
        nav a { color: #aac4ff; text-decoration: none; font-size: 0.9rem; padding: 6px 14px; border-radius: 4px; }
        nav a:hover, nav a.active { background: #16213e; color: #fff; }
        .container { max-width: 1300px; margin: 32px auto; padding: 0 24px; }
        .page-title { font-size: 1.1rem; font-weight: 600; color: #1a1a2e; margin-bottom: 16px; }

        /* 검색 폼 */
        .search-card { background: #fff; border-radius: 10px; padding: 20px 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .search-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; align-items: end; }
        .field label { display: block; font-size: 0.75rem; font-weight: 600; color: #555; margin-bottom: 4px; }
        .field input, .field select {
            width: 100%; padding: 7px 10px; border: 1px solid #d0d7de; border-radius: 6px;
            font-size: 0.85rem; background: #fafafa; color: #333;
        }
        .field input:focus, .field select:focus { outline: none; border-color: #3b5bdb; background: #fff; }
        .btn-row { display: flex; gap: 8px; align-items: flex-end; }
        .btn { padding: 7px 18px; border: none; border-radius: 6px; font-size: 0.85rem; cursor: pointer; font-weight: 500; }
        .btn-primary { background: #3b5bdb; color: #fff; }
        .btn-primary:hover { background: #1c3faa; }
        .btn-reset { background: #e9ecef; color: #495057; text-decoration: none; display: inline-block; }
        .btn-reset:hover { background: #dee2e6; }

        /* 결과 요약 */
        .result-summary { font-size: 0.85rem; color: #666; margin-bottom: 10px; }
        .result-summary strong { color: #1a1a2e; }

        /* 테이블 */
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        thead { background: #1a1a2e; color: #fff; }
        th { padding: 11px 14px; text-align: left; font-size: 0.8rem; font-weight: 500; white-space: nowrap; }
        td { padding: 11px 14px; font-size: 0.84rem; border-bottom: 1px solid #f0f0f0; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8f9ff; }
        .num { text-align: right; font-variant-numeric: tabular-nums; }

        /* 뱃지 */
        .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.74rem; font-weight: 700; }
        .badge-purchase      { background: #ebfbee; color: #2f9e44; }
        .badge-partial       { background: #fff3bf; color: #e67700; }
        .badge-total-cancel  { background: #fff0f0; color: #e03131; }

        .status-progress  { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.74rem; font-weight: 700; background: #e7f5ff; color: #1971c2; }
        .status-confirmed { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.74rem; font-weight: 700; background: #f3f0ff; color: #6741d9; }

        .empty { text-align: center; color: #999; padding: 48px; }
        code { font-family: monospace; font-size: 0.8rem; color: #555; }

        /* 페이지네이션 */
        .pagination { display: flex; justify-content: center; gap: 4px; margin-top: 20px; }
        .pagination a, .pagination span {
            padding: 6px 12px; border-radius: 6px; font-size: 0.85rem; text-decoration: none;
            border: 1px solid #d0d7de; color: #333; background: #fff;
        }
        .pagination a:hover { background: #e9ecef; }
        .pagination .active { background: #3b5bdb; color: #fff; border-color: #3b5bdb; font-weight: 600; }
        .pagination .disabled { color: #aaa; pointer-events: none; }

        /* 모달 */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: #fff; border-radius: 10px; padding: 28px 32px; min-width: 480px; max-width: 640px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
        .modal-header h2 { font-size: 1rem; font-weight: 700; color: #1a1a2e; }
        .modal-close { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: #888; }
        .modal table { box-shadow: none; border: 1px solid #e9ecef; }
        .modal thead { background: #f1f3f5; }
        .modal th { color: #333; }
        .cancel-link { color: #3b5bdb; cursor: pointer; text-decoration: underline; }
        .cancel-link:hover { color: #1c3faa; }
    </style>
</head>
<body>
<header>
    <h1>🛠 Point Admin</h1>
    <nav>
        <a href="/admin/accounts">사용자 계정</a>
        <a href="/admin/points">포인트 적립 내역</a>
        <a href="/admin/orders" class="active">포인트 사용 내역</a>
    </nav>
</header>

<div class="container">
    <div class="page-title">포인트 사용 내역</div>

    <!-- 검색 폼 -->
    <div class="search-card">
        <form method="get" action="/admin/orders">
            <div class="search-grid">
                <div class="field">
                    <label>사용자 ID</label>
                    <input type="text" name="userId" placeholder="userId" th:value="${userId}"/>
                </div>
                <div class="field">
                    <label>주문 번호</label>
                    <input type="text" name="orderNo" placeholder="orderNo" th:value="${orderNo}"/>
                </div>
                <div class="field">
                    <label>취소 유형</label>
                    <select name="type">
                        <option value="">전체</option>
                        <option value="PURCHASE"      th:selected="${type == 'PURCHASE'}">구매</option>
                        <option value="PARTIAL_CANCEL" th:selected="${type == 'PARTIAL_CANCEL'}">부분 취소</option>
                        <option value="TOTAL_CANCEL"  th:selected="${type == 'TOTAL_CANCEL'}">전액 취소</option>
                    </select>
                </div>
                <div class="field">
                    <label>사용일 시작</label>
                    <input type="date" name="startDate" th:value="${startDate}"/>
                </div>
                <div class="field">
                    <label>사용일 종료</label>
                    <input type="date" name="endDate" th:value="${endDate}"/>
                </div>
                <div class="field btn-row">
                    <button type="submit" class="btn btn-primary">조회</button>
                    <a href="/admin/orders" class="btn btn-reset">초기화</a>
                </div>
            </div>
        </form>
    </div>

    <!-- 결과 요약 -->
    <div class="result-summary">
        총 <strong th:text="${orders.totalElements}">0</strong>건
        (페이지 <strong th:text="${currentPage + 1}">1</strong> / <strong th:text="${totalPages}">1</strong>)
    </div>

    <!-- 테이블 -->
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>사용자 ID</th>
                <th>주문 번호</th>
                <th class="num">사용 포인트</th>
                <th class="num">취소 포인트</th>
                <th class="num">잔여 사용</th>
                <th>취소 유형</th>
                <th>진행 상태</th>
                <th>사용일시</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="o : ${orders}">
                <td th:text="${o.id}"></td>
                <td th:text="${o.userId}"></td>
                <td><code th:text="${o.orderNo}"></code></td>
                <td class="num" th:text="${#numbers.formatInteger(o.orderedPoint, 1, 'COMMA')}"></td>
                <td class="num">
                    <span th:if="${o.canceledPoint > 0}"
                          class="cancel-link"
                          th:data-order-id="${o.id}"
                          th:data-order-no="${o.orderNo}"
                          onclick="openCancelModal(this)">
                        [[${#numbers.formatInteger(o.canceledPoint, 1, 'COMMA')}]]
                    </span>
                    <span th:if="${o.canceledPoint == 0}">0</span>
                </td>
                <td class="num" th:text="${#numbers.formatInteger(o.orderedPoint - o.canceledPoint, 1, 'COMMA')}"></td>
                <td>
                    <span class="badge"
                          th:classappend="${o.type.name() == 'PURCHASE'} ? 'badge-purchase' : (${o.type.name() == 'PARTIAL_CANCEL'} ? 'badge-partial' : 'badge-total-cancel')"
                          th:text="${o.type.name() == 'PURCHASE'} ? '구매' : (${o.type.name() == 'PARTIAL_CANCEL'} ? '부분 취소' : '전액 취소')"></span>
                </td>
                <td>
                    <span th:if="${o.status.name() == 'IN_PROGRESS'}" class="status-progress">진행중</span>
                    <span th:if="${o.status.name() == 'CONFIRMED'}"   class="status-confirmed">확정</span>
                </td>
                <td th:text="${#temporals.format(o.regDateTime, 'yyyy-MM-dd HH:mm')}"></td>
            </tr>
            <tr th:if="${orders == null or orders.isEmpty()}">
                <td colspan="9" class="empty">조회된 내역이 없습니다.</td>
            </tr>
        </tbody>
    </table>

    <!-- 페이지네이션 -->
    <div class="pagination" th:if="${totalPages > 1}">
        <a th:if="${currentPage > 0}"
           th:href="@{/admin/orders(userId=${userId}, orderNo=${orderNo}, type=${type}, startDate=${startDate}, endDate=${endDate}, page=${currentPage - 1})}">이전</a>
        <span th:if="${currentPage == 0}" class="disabled">이전</span>

        <th:block th:each="i : ${#numbers.sequence(startPage, endPage)}">
            <a th:if="${i != currentPage}"
               th:href="@{/admin/orders(userId=${userId}, orderNo=${orderNo}, type=${type}, startDate=${startDate}, endDate=${endDate}, page=${i})}"
               th:text="${i + 1}"></a>
            <span th:if="${i == currentPage}" class="active" th:text="${i + 1}"></span>
        </th:block>

        <a th:if="${currentPage < totalPages - 1}"
           th:href="@{/admin/orders(userId=${userId}, orderNo=${orderNo}, type=${type}, startDate=${startDate}, endDate=${endDate}, page=${currentPage + 1})}">다음</a>
        <span th:if="${currentPage >= totalPages - 1}" class="disabled">다음</span>
    </div>
</div>
<!-- 취소 상세 모달 -->
<div class="modal-overlay" id="cancelModal">
    <div class="modal">
        <div class="modal-header">
            <h2 id="modalTitle">취소 상세</h2>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th class="num">취소 금액</th>
                    <th>취소 일시</th>
                </tr>
            </thead>
            <tbody id="cancelTableBody">
                <tr><td colspan="3" class="empty">로딩 중...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
function openCancelModal(el) {
    const orderId = el.dataset.orderId;
    const orderNo = el.dataset.orderNo;
    document.getElementById('modalTitle').textContent = '취소 상세 — ' + orderNo;
    document.getElementById('cancelModal').classList.add('open');
    document.getElementById('cancelTableBody').innerHTML = '<tr><td colspan="3" class="empty">로딩 중...</td></tr>';

    fetch('/admin/order-cancels?orderId=' + orderId)
        .then(r => r.json())
        .then(data => {
            if (!data.length) {
                document.getElementById('cancelTableBody').innerHTML = '<tr><td colspan="3" class="empty">취소 내역이 없습니다.</td></tr>';
                return;
            }
            const rows = data.map((c, i) => {
                const dt = c.regDateTime ? c.regDateTime.replace('T', ' ').substring(0, 16) : '-';
                return `<tr><td>${i+1}</td><td class="num">${Number(c.cancelAmount).toLocaleString()}</td><td>${dt}</td></tr>`;
            }).join('');
            document.getElementById('cancelTableBody').innerHTML = rows;
        })
        .catch(() => {
            document.getElementById('cancelTableBody').innerHTML = '<tr><td colspan="3" class="empty">오류가 발생했습니다.</td></tr>';
        });
}

function closeModal() {
    document.getElementById('cancelModal').classList.remove('open');
}

document.getElementById('cancelModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});
</script>
</body>
</html>
