<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Admin - 포인트 적립 내역</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; color: #333; }
        header { background: #1a1a2e; color: #fff; padding: 16px 32px; display: flex; align-items: center; gap: 24px; }
        header h1 { font-size: 1.2rem; font-weight: 600; }
        nav a { color: #aac4ff; text-decoration: none; font-size: 0.9rem; padding: 6px 14px; border-radius: 4px; }
        nav a:hover, nav a.active { background: #16213e; color: #fff; }
        .container { max-width: 1400px; margin: 32px auto; padding: 0 24px; }
        .page-title { font-size: 1.1rem; font-weight: 600; color: #1a1a2e; margin-bottom: 16px; }

        /* 검색 폼 */
        .search-card { background: #fff; border-radius: 10px; padding: 20px 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .search-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; align-items: end; }
        .field label { display: block; font-size: 0.75rem; font-weight: 600; color: #555; margin-bottom: 4px; }
        .field input, .field select {
            width: 100%; padding: 7px 10px; border: 1px solid #d0d7de; border-radius: 6px;
            font-size: 0.85rem; background: #fafafa; color: #333;
        }
        .field input:focus, .field select:focus { outline: none; border-color: #3b5bdb; background: #fff; }
        .btn-row { display: flex; gap: 8px; align-items: flex-end; }
        .btn { padding: 7px 18px; border: none; border-radius: 6px; font-size: 0.85rem; cursor: pointer; font-weight: 500; }
        .btn-primary { background: #3b5bdb; color: #fff; }
        .btn-primary:hover { background: #1c3faa; }
        .btn-reset { background: #e9ecef; color: #495057; }
        .btn-reset:hover { background: #dee2e6; }

        /* 결과 요약 */
        .result-summary { font-size: 0.85rem; color: #666; margin-bottom: 10px; }
        .result-summary strong { color: #1a1a2e; }

        /* 테이블 */
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        thead { background: #1a1a2e; color: #fff; }
        th { padding: 11px 14px; text-align: center; font-size: 0.8rem; font-weight: 500; white-space: nowrap; }
        td { padding: 11px 14px; font-size: 0.84rem; border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8f9ff; }
        .num { text-align: right; font-variant-numeric: tabular-nums; }

        /* 뱃지 */
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.74rem; font-weight: 600; }
        .badge-free { background: #e7f5ff; color: #1971c2; }
        .badge-paid { background: #fff3bf; color: #e67700; }
        .badge-manual { background: #f3f0ff; color: #6741d9; }
        .badge-accumulation { background: #ebfbee; color: #2f9e44; }
        .badge-auto-restored { background: #fff0f6; color: #c2255c; }

        /* 상태 */
        .status-cancelled { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.74rem; font-weight: 700; background: #fff0f0; color: #e03131; }
        .status-active    { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.74rem; font-weight: 700; background: #ebfbee; color: #2f9e44; }

        .empty { text-align: center; color: #999; padding: 48px; }
        code { font-family: monospace; font-size: 0.8rem; color: #555; }

        /* 모달 */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: #fff; border-radius: 12px; width: 90%; max-width: 760px; max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
        .modal-header { padding: 18px 24px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
        .modal-header h2 { font-size: 1rem; font-weight: 600; color: #1a1a2e; }
        .modal-header .modal-key { font-family: monospace; font-size: 0.85rem; color: #3b5bdb; margin-left: 8px; }
        .modal-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #888; line-height: 1; }
        .modal-close:hover { color: #333; }
        .modal-body { overflow-y: auto; padding: 20px 24px; }
        .modal-body table { width: 100%; border-collapse: collapse; }
        .modal-body th { background: #f4f6f9; padding: 9px 12px; font-size: 0.78rem; font-weight: 600; color: #555; text-align: left; border-bottom: 1px solid #e0e0e0; }
        .modal-body td { padding: 9px 12px; font-size: 0.82rem; border-bottom: 1px solid #f0f0f0; }
        .modal-body tr:last-child td { border-bottom: none; }
        .modal-empty { text-align: center; color: #999; padding: 32px; font-size: 0.9rem; }

        /* 이벤트 타입 뱃지 */
        .badge-accumulate  { background: #ebfbee; color: #2f9e44; }
        .badge-use         { background: #e7f5ff; color: #1971c2; }
        .badge-use-cancel  { background: #fff4e6; color: #e67700; }
        .badge-cancel      { background: #fff0f0; color: #e03131; }
        .badge-expire      { background: #f3f0ff; color: #6741d9; }
        .badge-auto-restored-ev { background: #fff0f6; color: #c2255c; }

        /* rootPointKey 링크 */
        .root-key-link { color: #e67700; text-decoration: none; font-family: monospace; font-size: 0.8rem; font-weight: 600; }
        .root-key-link:hover { text-decoration: underline; }

        /* 페이지네이션 */
        .pagination { display: flex; justify-content: center; gap: 4px; margin-top: 20px; }
        .pagination a, .pagination span {
            padding: 6px 12px; border-radius: 6px; font-size: 0.85rem; text-decoration: none;
            border: 1px solid #d0d7de; color: #333; background: #fff;
        }
        .pagination a:hover { background: #e9ecef; }
        .pagination .active { background: #3b5bdb; color: #fff; border-color: #3b5bdb; font-weight: 600; }
        .pagination .disabled { color: #aaa; pointer-events: none; }
    </style>
</head>
<body>
<header>
    <h1>🛠 Point Admin</h1>
    <nav>
        <a href="/admin/accounts">사용자 계정</a>
        <a href="/admin/points" class="active">포인트 적립 내역</a>
        <a href="/admin/orders">포인트 사용 내역</a>
        <a href="/admin/stats">통계</a>
    </nav>
</header>

<div class="container">
    <div class="page-title">포인트 적립 내역</div>

    <!-- 검색 폼 -->
    <div class="search-card">
        <form method="get" action="/admin/points">
            <div class="search-grid">
                <div class="field">
                    <label>사용자 ID</label>
                    <input type="text" name="userId" placeholder="userId" th:value="${userId}"/>
                </div>
                <div class="field">
                    <label>취소 여부</label>
                    <select name="status">
                        <option value="">전체</option>
                        <option value="cancelled" th:selected="${status == 'cancelled'}">취소</option>
                    </select>
                </div>
                <div class="field">
                    <label>포인트 타입</label>
                    <select name="type">
                        <option value="">전체</option>
                        <option value="FREE" th:selected="${type == 'FREE'}">무료</option>
                        <option value="PAID" th:selected="${type == 'PAID'}">유료</option>
                    </select>
                </div>
                <div class="field">
                    <label>적립 출처</label>
                    <select name="sourceType">
                        <option value="">전체</option>
                        <option value="ACCUMULATION"   th:selected="${sourceType == 'ACCUMULATION'}">적립</option>
                        <option value="MANUAL"        th:selected="${sourceType == 'MANUAL'}">수기지급</option>
                        <option value="AUTO_RESTORED" th:selected="${sourceType == 'AUTO_RESTORED'}">만료후취소재적립</option>
                    </select>
                </div>
                <div class="field">
                    <label>적립일자 시작</label>
                    <input type="date" name="startDate" th:value="${startDate}"/>
                </div>
                <div class="field">
                    <label>적립일자 종료</label>
                    <input type="date" name="endDate" th:value="${endDate}"/>
                </div>
                <div class="field">
                    <label>pointKey</label>
                    <input type="text" name="pointKey" th:value="${pointKey}" placeholder="포인트 키 입력"/>
                </div>
                <div class="field">
                    <label>주문번호(orderNo)</label>
                    <input type="text" name="orderNo" th:value="${orderNo}" placeholder="주문번호 입력"/>
                </div>
                <div class="field btn-row">
                    <button type="submit" class="btn btn-primary">조회</button>
                    <a href="/admin/points" class="btn btn-reset">초기화</a>
                </div>
            </div>
        </form>
    </div>

    <!-- 결과 요약 -->
    <div class="result-summary" th:if="${points != null}">
        총 <strong th:text="${points.totalElements}">0</strong>건
        (페이지 <strong th:text="${currentPage + 1}">1</strong> / <strong th:text="${totalPages}">1</strong>)
    </div>

    <!-- 페이지당 건수 -->
    <div style="display:flex; justify-content:flex-end; align-items:center; gap:8px; margin-bottom:8px;">
        <label style="font-size:0.78rem; font-weight:600; color:#555;">페이지당 건수</label>
        <form method="get" action="/admin/points" style="display:inline;">
            <input type="hidden" name="userId" th:value="${userId}"/>
            <input type="hidden" name="status" th:value="${status}"/>
            <input type="hidden" name="type" th:value="${type}"/>
            <input type="hidden" name="sourceType" th:value="${sourceType}"/>
            <input type="hidden" name="startDate" th:value="${startDate}"/>
            <input type="hidden" name="endDate" th:value="${endDate}"/>
            <input type="hidden" name="pointKey" th:value="${pointKey}"/>
            <input type="hidden" name="orderNo" th:value="${orderNo}"/>
            <input type="hidden" name="page" value="0"/>
            <select name="size" onchange="this.form.submit()" style="padding:5px 10px; border:1px solid #d0d7de; border-radius:6px; font-size:0.82rem; background:#fafafa;">
                <option value="10" th:selected="${pageSize == 10}">10건</option>
                <option value="20" th:selected="${pageSize == 20}">20건</option>
                <option value="50" th:selected="${pageSize == 50}">50건</option>
                <option value="100" th:selected="${pageSize == 100}">100건</option>
            </select>
        </form>
    </div>

    <!-- 테이블 -->
    <div id="tableScroll" style="overflow-x: auto; border-radius: 8px; cursor: default;">
    <table>
        <thead>
            <tr>
                <th>pointKey</th>
                <th>사용자 ID</th>
                <th>타입</th>
                <th>출처</th>
                <th>만료여부</th>
                <th>취소 여부</th>
                <th class="num">적립 금액</th>
                <th class="num">잔여 금액</th>
                <th class="num">사용 금액</th>
                <th class="num">사용취소 금액</th>
                <th class="num">만료금액</th>
                <th>rootPointKey</th>
                <th>원천 pointKey</th>
                <th>재지급 pointKey</th>
                <th>만료일</th>
                <th>적립일시</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${points}">
                <td><a href="#" class="point-key-link" th:attr="data-key=${p.pointKey}" style="color:#3b5bdb;text-decoration:none;font-family:monospace;font-size:0.8rem;" th:text="${p.pointKey}"></a></td>
                <td th:text="${p.userId}"></td>
                <td>
                    <span class="badge"
                          th:classappend="${p.type.name() == 'PAID'} ? 'badge-paid' : 'badge-free'"
                          th:text="${p.type.description}"></span>
                </td>
                <td>
                    <span class="badge"
                          th:classappend="${p.pointSourceType.name() == 'MANUAL'} ? 'badge-manual' : (${p.pointSourceType.name() == 'AUTO_RESTORED'} ? 'badge-auto-restored' : 'badge-accumulation')"
                          th:text="${p.pointSourceType.description}"></span>
                </td>
                <td>
                    <span th:if="${p.expired}" class="status-cancelled">만료</span>
                    <span th:if="${!p.expired}" style="color:#aaa;font-size:0.8rem;">-</span>
                </td>
                <td>
                    <span th:if="${p.cancelled}"  class="status-cancelled">취소</span>
                    <span th:if="${!p.cancelled}" style="color:#aaa;font-size:0.8rem;">-</span>
                </td>
                <td class="num" th:text="${#numbers.formatInteger(p.accumulatedPoint, 1, 'COMMA')}"></td>
                <td class="num" th:text="${#numbers.formatInteger(p.remainingPoint, 1, 'COMMA')}"></td>
                <td class="num" th:text="${p.usedPoint != null ? #numbers.formatInteger(p.usedPoint, 1, 'COMMA') : '-'}"></td>
                <td class="num" th:text="${p.usedCancelPoint != null ? #numbers.formatInteger(p.usedCancelPoint, 1, 'COMMA') : '-'}"></td>
                <td class="num" th:text="${p.expiredPoint != null ? #numbers.formatInteger(p.expiredPoint, 1, 'COMMA') : '-'}"></td>
                <td>
                    <a th:if="${p.rootPointKey != null and p.rootPointKey != p.pointKey}" href="#" class="root-key-link" th:attr="data-root-key=${p.rootPointKey}" th:text="${p.rootPointKey}"></a>
                    <span th:if="${p.rootPointKey == null or p.rootPointKey == p.pointKey}" style="color:#aaa;font-size:0.8rem;">-</span>
                </td>
                <td>
                    <a th:if="${p.originPointKey != null}" href="#" class="point-key-link" th:attr="data-key=${p.originPointKey}" style="color:#3b5bdb;text-decoration:none;font-family:monospace;font-size:0.8rem;" th:text="${p.originPointKey}"></a>
                    <span th:if="${p.originPointKey == null}" style="color:#aaa;font-size:0.8rem;">-</span>
                </td>
                <td>
                    <a th:if="${restoredPointKeyMap[p.id] != null}" href="#" class="point-key-link" th:attr="data-key=${restoredPointKeyMap[p.id]}" style="color:#3b5bdb;text-decoration:none;font-family:monospace;font-size:0.8rem;" th:text="${restoredPointKeyMap[p.id]}"></a>
                    <span th:if="${restoredPointKeyMap[p.id] == null}" style="color:#aaa;font-size:0.8rem;">-</span>
                </td>
                <td th:text="${#temporals.format(p.expiryDate, 'yyyy-MM-dd')}"></td>
                <td th:text="${#temporals.format(p.regDateTime, 'yyyy-MM-dd HH:mm')}"></td>
            </tr>
            <tr th:if="${points == null or points.isEmpty()}">
                <td colspan="16" class="empty">조회된 내역이 없습니다.</td>
            </tr>
        </tbody>
    </table>
    </div>

    <!-- 페이지네이션 -->
    <div class="pagination" th:if="${totalPages > 1}">
        <a th:if="${currentPage > 0}"
           th:href="@{/admin/points(userId=${userId}, status=${status}, type=${type}, sourceType=${sourceType}, startDate=${startDate}, endDate=${endDate}, pointKey=${pointKey}, orderNo=${orderNo}, page=${currentPage - 1}, size=${pageSize})}">이전</a>
        <span th:if="${currentPage == 0}" class="disabled">이전</span>

        <th:block th:each="i : ${#numbers.sequence(startPage, endPage)}">
            <a th:if="${i != currentPage}"
               th:href="@{/admin/points(userId=${userId}, status=${status}, type=${type}, sourceType=${sourceType}, startDate=${startDate}, endDate=${endDate}, pointKey=${pointKey}, orderNo=${orderNo}, page=${i}, size=${pageSize})}"
               th:text="${i + 1}"></a>
            <span th:if="${i == currentPage}" class="active" th:text="${i + 1}"></span>
        </th:block>

        <a th:if="${currentPage < totalPages - 1}"
           th:href="@{/admin/points(userId=${userId}, status=${status}, type=${type}, sourceType=${sourceType}, startDate=${startDate}, endDate=${endDate}, pointKey=${pointKey}, orderNo=${orderNo}, page=${currentPage + 1}, size=${pageSize})}">다음</a>
        <span th:if="${currentPage >= totalPages - 1}" class="disabled">다음</span>
    </div>
</div>

<!-- 이벤트 이력 모달 -->
<div class="modal-overlay" id="eventModal">
    <div class="modal">
        <div class="modal-header">
            <h2>포인트 이벤트 이력 <span class="modal-key" id="modalPointKey"></span></h2>
            <button class="modal-close" id="modalClose">&times;</button>
        </div>
        <div class="modal-body">
            <div style="margin-bottom:12px;display:flex;align-items:center;gap:8px;">
                <label style="font-size:0.8rem;font-weight:600;color:#555;">이벤트 타입</label>
                <select id="eventTypeFilter" style="padding:5px 10px;border:1px solid #d0d7de;border-radius:6px;font-size:0.82rem;background:#fafafa;">
                    <option value="">전체</option>
                    <option value="ACCUMULATE">적립</option>
                    <option value="USE">사용</option>
                    <option value="ACCUMULATE_CANCEL">적립취소</option>
                    <option value="USE_CANCEL">사용취소</option>
                    <option value="EXPIRE">만료</option>
                    <option value="EXPIRED_CANCEL_RESTORE">만료후취소재적립</option>
                </select>
            </div>
            <div id="modalContent"><p class="modal-empty">로딩 중...</p></div>
        </div>
    </div>
</div>

<!-- rootPointKey 연관 포인트 모달 -->
<div class="modal-overlay" id="rootKeyModal">
    <div class="modal" style="max-width:1000px">
        <div class="modal-header">
            <h2>연관 포인트 내역 <span class="modal-key" id="rootKeyModalTitle"></span></h2>
            <button class="modal-close" id="rootKeyModalClose">&times;</button>
        </div>
        <div class="modal-body">
            <div id="rootKeyModalContent"><p class="modal-empty">로딩 중...</p></div>
        </div>
    </div>
</div>

<script>
    const eventTypeLabel = {
        ACCUMULATE:              { label: '적립',           cls: 'badge-accumulate' },
        USE:                     { label: '사용',           cls: 'badge-use' },
        CANCEL:                  { label: '취소',           cls: 'badge-cancel' },
        EXPIRE:                  { label: '만료',           cls: 'badge-expire' },
        ACCUMULATE_CANCEL:       { label: '적립취소',        cls: 'badge-cancel' },
        USE_CANCEL:              { label: '사용취소',        cls: 'badge-use-cancel' },
        EXPIRED_CANCEL_RESTORE:  { label: '만료후취소재적립', cls: 'badge-auto-restored-ev' }
    };

    document.querySelectorAll('.point-key-link').forEach(link => {
        link.addEventListener('click', e => {
            e.preventDefault();
            const pointKey = link.dataset.key;
            openModal(pointKey);
        });
    });

    document.querySelectorAll('.root-key-link').forEach(link => {
        link.addEventListener('click', e => {
            e.preventDefault();
            const rootPointKey = link.dataset.rootKey;
            openRootKeyModal(rootPointKey);
        });
    });

    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('eventModal').addEventListener('click', e => {
        if (e.target === document.getElementById('eventModal')) closeModal();
    });
    document.getElementById('rootKeyModalClose').addEventListener('click', closeRootKeyModal);
    document.getElementById('rootKeyModal').addEventListener('click', e => {
        if (e.target === document.getElementById('rootKeyModal')) closeRootKeyModal();
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeRootKeyModal(); } });

    let allModalEvents = [];

    document.getElementById('eventTypeFilter').addEventListener('change', () => {
        renderModal(allModalEvents);
    });

    function openModal(pointKey) {
        document.getElementById('modalPointKey').textContent = pointKey;
        document.getElementById('modalContent').innerHTML = '<p class="modal-empty">로딩 중...</p>';
        document.getElementById('eventTypeFilter').value = '';
        document.getElementById('eventModal').classList.add('open');

        fetch('/admin/point-events?pointKey=' + encodeURIComponent(pointKey))
            .then(r => r.json())
            .then(data => { allModalEvents = data; renderModal(data); })
            .catch(() => {
                document.getElementById('modalContent').innerHTML = '<p class="modal-empty">데이터를 불러오지 못했습니다.</p>';
            });
    }

    function closeModal() {
        document.getElementById('eventModal').classList.remove('open');
    }

    function openRootKeyModal(rootPointKey) {
        document.getElementById('rootKeyModalTitle').textContent = rootPointKey;
        document.getElementById('rootKeyModalContent').innerHTML = '<p class="modal-empty">로딩 중...</p>';
        document.getElementById('rootKeyModal').classList.add('open');

        fetch('/admin/points-by-root-key?rootPointKey=' + encodeURIComponent(rootPointKey))
            .then(r => r.json())
            .then(data => renderRootKeyModal(data))
            .catch(() => {
                document.getElementById('rootKeyModalContent').innerHTML = '<p class="modal-empty">데이터를 불러오지 못했습니다.</p>';
            });
    }

    function closeRootKeyModal() {
        document.getElementById('rootKeyModal').classList.remove('open');
    }

    function renderRootKeyModal(points) {
        if (!points || points.length === 0) {
            document.getElementById('rootKeyModalContent').innerHTML = '<p class="modal-empty">연관 포인트가 없습니다.</p>';
            return;
        }
        const sourceLabel = { ACCUMULATION: '적립', MANUAL: '수기지급', AUTO_RESTORED: '만료후취소재적립' };
        const typeLabel = { FREE: '무료', PAID: '유료' };
        let html = '<table><thead><tr><th>pointKey</th><th>타입</th><th>출처</th><th>상태</th><th style="text-align:right">적립금액</th><th style="text-align:right">잔여금액</th><th style="text-align:right">사용금액</th><th style="text-align:right">만료금액</th><th>원천 pointKey</th><th>만료일</th><th>적립일시</th></tr></thead><tbody>';
        points.forEach(p => {
            const status = p.isCancelled ? '<span class="status-cancelled">취소</span>' : p.isExpired ? '<span class="status-cancelled">만료</span>' : '<span class="status-active">정상</span>';
            const src = p.pointSourceType;
            const srcCls = src === 'MANUAL' ? 'badge-manual' : src === 'AUTO_RESTORED' ? 'badge-auto-restored' : 'badge-accumulation';
            const typCls = p.type === 'PAID' ? 'badge-paid' : 'badge-free';
            const originKey = p.originPointKey ? `<code style="font-size:0.78rem">${p.originPointKey}</code>` : '-';
            const expiry = p.expiryDate || '-';
            const reg = p.regDateTime ? p.regDateTime.replace('T', ' ').substring(0, 16) : '-';
            html += `<tr>
                <td><a href="#" class="point-key-link" data-key="${p.pointKey}" style="color:#3b5bdb;text-decoration:none;font-family:monospace;font-size:0.8rem">${p.pointKey}</a></td>
                <td><span class="badge ${typCls}">${typeLabel[p.type] || p.type}</span></td>
                <td><span class="badge ${srcCls}">${sourceLabel[src] || src}</span></td>
                <td>${status}</td>
                <td style="text-align:right;font-variant-numeric:tabular-nums">${Number(p.accumulatedPoint).toLocaleString()}</td>
                <td style="text-align:right;font-variant-numeric:tabular-nums">${Number(p.remainingPoint).toLocaleString()}</td>
                <td style="text-align:right;font-variant-numeric:tabular-nums;color:#555">${p.usedPoint != null ? Number(p.usedPoint).toLocaleString() : '-'}</td>
                <td style="text-align:right;font-variant-numeric:tabular-nums;color:#6741d9">${p.expiredPoint != null ? Number(p.expiredPoint).toLocaleString() : '-'}</td>
                <td>${originKey}</td>
                <td style="font-size:0.8rem;color:#555">${expiry}</td>
                <td style="font-size:0.8rem;color:#555">${reg}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('rootKeyModalContent').innerHTML = html;

        // 모달 내 point-key-link 클릭 이벤트 재등록
        document.querySelectorAll('#rootKeyModalContent .point-key-link').forEach(link => {
            link.addEventListener('click', e => {
                e.preventDefault();
                openModal(link.dataset.key);
            });
        });
    }

    // 이벤트 타입별 금액 부호 (+/-)
    const positiveTypes = new Set(['ACCUMULATE', 'USE_CANCEL', 'EXPIRED_CANCEL_RESTORE']);
    const negativeTypes = new Set(['USE', 'CANCEL', 'EXPIRE', 'ACCUMULATE_CANCEL']);

    function renderModal(events) {
        const filterType = document.getElementById('eventTypeFilter').value;
        const filtered = filterType ? events.filter(ev => ev.pointEventType === filterType) : events;
        if (!filtered || filtered.length === 0) {
            document.getElementById('modalContent').innerHTML = '<p class="modal-empty">이벤트 이력이 없습니다.</p>';
            return;
        }
        let sum = 0;
        let html = '<table><thead><tr><th>#</th><th>이벤트 타입</th><th style="text-align:right">금액</th><th>주문번호</th><th>취소 ID</th><th style="text-align:right">취소 금액</th><th>발생일시</th></tr></thead><tbody>';
        filtered.forEach((ev, i) => {
            const t = eventTypeLabel[ev.pointEventType] || { label: ev.pointEventType, cls: '' };
            const raw = Number(ev.amount);
            const isPositive = positiveTypes.has(ev.pointEventType);
            const isNegative = negativeTypes.has(ev.pointEventType);
            const signed = isPositive ? raw : isNegative ? -raw : raw;
            sum += signed;
            const sign = isPositive ? '+' : isNegative ? '-' : '';
            const color = isPositive ? '#2f9e44' : isNegative ? '#e03131' : '#555';
            const amtStr = sign + raw.toLocaleString();
            const orderNo = ev.orderNo || '-';
            const cancelId = ev.orderCancelId != null ? ev.orderCancelId : '-';
            const cancelAmt = ev.cancelAmount != null ? Number(ev.cancelAmount).toLocaleString() : '-';
            const dt = ev.regDateTime ? ev.regDateTime.replace('T', ' ').substring(0, 16) : '-';
            html += `<tr>
                <td style="color:#999;font-size:0.75rem">${i + 1}</td>
                <td><span class="badge ${t.cls}">${t.label}</span></td>
                <td style="text-align:right;font-variant-numeric:tabular-nums;color:${color};font-weight:600">${amtStr}</td>
                <td><code>${orderNo}</code></td>
                <td style="color:#999;font-size:0.78rem">${cancelId}</td>
                <td style="text-align:right;font-variant-numeric:tabular-nums;color:#e03131;font-size:0.82rem">${cancelAmt}</td>
                <td style="color:#555;font-size:0.8rem">${dt}</td>
            </tr>`;
        });
        const sumColor = sum >= 0 ? '#2f9e44' : '#e03131';
        const sumSign = sum >= 0 ? '+' : '';
        html += `</tbody><tfoot><tr style="background:#f4f6f9;font-weight:700">
            <td colspan="2" style="padding:10px 12px;font-size:0.82rem;color:#555">잔여 합계</td>
            <td style="text-align:right;font-variant-numeric:tabular-nums;color:${sumColor};font-size:0.9rem;padding:10px 12px">${sumSign}${sum.toLocaleString()}</td>
            <td colspan="4"></td>
        </tr></tfoot></table>`;
        document.getElementById('modalContent').innerHTML = html;
    }

    // 가운데 휠 클릭으로 가로 스크롤
    (function() {
        const el = document.getElementById('tableScroll');
        let isDown = false, startX, scrollLeft;
        el.addEventListener('mousedown', e => {
            if (e.button !== 1) return;
            e.preventDefault();
            isDown = true;
            startX = e.pageX - el.offsetLeft;
            scrollLeft = el.scrollLeft;
            el.style.cursor = 'grabbing';
        });
        document.addEventListener('mouseup', e => {
            if (e.button !== 1) return;
            isDown = false;
            el.style.cursor = 'default';
        });
        document.addEventListener('mousemove', e => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - el.offsetLeft;
            el.scrollLeft = scrollLeft - (x - startX);
        });
    })();
</script>
</body>
</html>
