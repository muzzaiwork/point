<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Admin - 사용자 계정 목록</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; color: #333; }
        header { background: #1a1a2e; color: #fff; padding: 16px 32px; display: flex; align-items: center; gap: 24px; }
        header h1 { font-size: 1.2rem; font-weight: 600; }
        nav a { color: #aac4ff; text-decoration: none; font-size: 0.9rem; padding: 6px 14px; border-radius: 4px; }
        nav a:hover, nav a.active { background: #16213e; color: #fff; }
        .container { max-width: 1300px; margin: 32px auto; padding: 0 24px; }
        .page-title { font-size: 1.1rem; font-weight: 600; color: #1a1a2e; margin-bottom: 16px; }

        /* 검색 폼 */
        .search-card { background: #fff; border-radius: 10px; padding: 20px 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .search-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; align-items: end; }
        .field label { display: block; font-size: 0.75rem; font-weight: 600; color: #555; margin-bottom: 4px; }
        .field input, .field select {
            width: 100%; padding: 7px 10px; border: 1px solid #d0d7de; border-radius: 6px;
            font-size: 0.85rem; background: #fafafa; color: #333;
        }
        .field input:focus, .field select:focus { outline: none; border-color: #3b5bdb; background: #fff; }
        .btn-row { display: flex; gap: 8px; align-items: flex-end; }
        .btn { padding: 7px 18px; border: none; border-radius: 6px; font-size: 0.85rem; cursor: pointer; font-weight: 500; }
        .btn-primary { background: #3b5bdb; color: #fff; }
        .btn-primary:hover { background: #1c3faa; }
        .btn-reset { background: #e9ecef; color: #495057; text-decoration: none; display: inline-block; }
        .btn-reset:hover { background: #dee2e6; }

        /* 결과 요약 */
        .result-summary { font-size: 0.85rem; color: #666; margin-bottom: 10px; }
        .result-summary strong { color: #1a1a2e; }

        /* 테이블 */
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        thead { background: #1a1a2e; color: #fff; }
        th { padding: 12px 16px; text-align: left; font-size: 0.82rem; font-weight: 500; white-space: nowrap; }
        td { padding: 12px 16px; font-size: 0.85rem; border-bottom: 1px solid #f0f0f0; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8f9ff; }
        .point-link { color: #3b5bdb; font-weight: 600; cursor: pointer; text-decoration: underline; }
        .point-link:hover { color: #1c3faa; }
        .use-link { color: #e67700; font-weight: 600; cursor: pointer; text-decoration: underline; }
        .use-link:hover { color: #b35900; }
        .num { text-align: right; font-variant-numeric: tabular-nums; }
        .empty { text-align: center; color: #999; padding: 32px; }

        /* 페이지네이션 */
        .pagination { display: flex; justify-content: center; gap: 4px; margin-top: 20px; }
        .pagination a, .pagination span {
            padding: 6px 12px; border-radius: 6px; font-size: 0.85rem; text-decoration: none;
            border: 1px solid #d0d7de; color: #333; background: #fff;
        }
        .pagination a:hover { background: #e9ecef; }
        .pagination .active { background: #3b5bdb; color: #fff; border-color: #3b5bdb; font-weight: 600; }
        .pagination .disabled { color: #aaa; pointer-events: none; }
    </style>
</head>
<body>
<header>
    <h1>🛠 Point Admin</h1>
    <nav>
        <a href="/admin/accounts" class="active">사용자 계정</a>
        <a href="/admin/points">포인트 적립 내역</a>
        <a href="/admin/orders">포인트 사용 내역</a>
        <a href="/admin/stats">통계</a>
    </nav>
</header>
<div class="container">
    <div class="page-title">사용자 계정 목록</div>

    <!-- 검색 폼 -->
    <div class="search-card">
        <form method="get" action="/admin/accounts">
            <div class="search-grid">
                <div class="field">
                    <label>사용자 ID</label>
                    <input type="text" name="userId" placeholder="userId" th:value="${userId}"/>
                </div>
                <div class="field">
                    <label>이름</label>
                    <input type="text" name="name" placeholder="이름" th:value="${name}"/>
                </div>
                <div class="field btn-row">
                    <button type="submit" class="btn btn-primary">조회</button>
                    <a href="/admin/accounts" class="btn btn-reset">초기화</a>
                </div>
            </div>
        </form>
    </div>

    <!-- 결과 요약 -->
    <div class="result-summary">
        총 <strong th:text="${accounts.totalElements}">0</strong>건
        (페이지 <strong th:text="${currentPage + 1}">1</strong> / <strong th:text="${totalPages}">1</strong>)
    </div>

    <!-- 페이지당 건수 -->
    <div style="display:flex; justify-content:flex-end; align-items:center; gap:8px; margin-bottom:8px;">
        <label style="font-size:0.78rem; font-weight:600; color:#555;">페이지당 건수</label>
        <form method="get" action="/admin/accounts" style="display:inline;">
            <input type="hidden" name="userId" th:value="${userId}"/>
            <input type="hidden" name="name" th:value="${name}"/>
            <input type="hidden" name="page" value="0"/>
            <select name="size" onchange="this.form.submit()" style="padding:5px 10px; border:1px solid #d0d7de; border-radius:6px; font-size:0.82rem; background:#fafafa;">
                <option value="10" th:selected="${pageSize == 10}">10건</option>
                <option value="20" th:selected="${pageSize == 20}">20건</option>
                <option value="50" th:selected="${pageSize == 50}">50건</option>
                <option value="100" th:selected="${pageSize == 100}">100건</option>
            </select>
        </form>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>userId</th>
                <th>이름</th>
                <th class="num">총 적립 (유료/무료)</th>
                <th class="num">총 사용 (유료/무료)</th>
                <th class="num">잔여 포인트 (유료/무료)</th>
                <th class="num">1회 적립 한도</th>
                <th class="num">보유 한도</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="a : ${accounts}">
                <td th:text="${a.id}"></td>
                <td th:text="${a.userId}"></td>
                <td th:text="${a.name}"></td>
                <td class="num">
                    <a class="point-link" th:href="@{/admin/points(userId=${a.userId})}" th:text="${#numbers.formatInteger(a.accumulatedPoint, 1, 'COMMA')}"></a>
                    <span style="color:#888; font-size:0.78rem;">
                        (<span th:text="${#numbers.formatInteger(a.accumulatedPaidPoint, 1, 'COMMA')}"></span>
                        / <span th:text="${#numbers.formatInteger(a.accumulatedFreePoint, 1, 'COMMA')}"></span>)
                    </span>
                </td>
                <td class="num">
                    <a class="use-link" th:href="@{/admin/orders(userId=${a.userId})}" th:text="${#numbers.formatInteger(a.usedPoint, 1, 'COMMA')}"></a>
                    <span style="color:#888; font-size:0.78rem;">
                        (<span th:text="${#numbers.formatInteger(a.usedPaidPoint, 1, 'COMMA')}"></span>
                        / <span th:text="${#numbers.formatInteger(a.usedFreePoint, 1, 'COMMA')}"></span>)
                    </span>
                </td>
                <td class="num">
                    <strong th:text="${#numbers.formatInteger(a.remainingPoint, 1, 'COMMA')}"></strong>
                    <span style="color:#888; font-size:0.78rem;">
                        (<span th:text="${#numbers.formatInteger(a.remainingPaidPoint, 1, 'COMMA')}"></span>
                        / <span th:text="${#numbers.formatInteger(a.remainingFreePoint, 1, 'COMMA')}"></span>)
                    </span>
                </td>
                <td class="num" th:text="${#numbers.formatInteger(a.maxAccumulationPoint, 1, 'COMMA')}"></td>
                <td class="num" th:text="${#numbers.formatInteger(a.maxRetentionPoint, 1, 'COMMA')}"></td>
            </tr>
            <tr th:if="${accounts.isEmpty()}">
                <td colspan="8" class="empty">데이터가 없습니다.</td>
            </tr>
        </tbody>
    </table>

    <!-- 페이지네이션 -->
    <div class="pagination" th:if="${totalPages > 1}">
        <a th:if="${currentPage > 0}"
           th:href="@{/admin/accounts(userId=${userId}, name=${name}, page=${currentPage - 1}, size=${pageSize})}">이전</a>
        <span th:if="${currentPage == 0}" class="disabled">이전</span>

        <th:block th:each="i : ${#numbers.sequence(startPage, endPage)}">
            <a th:if="${i != currentPage}"
               th:href="@{/admin/accounts(userId=${userId}, name=${name}, page=${i}, size=${pageSize})}"
               th:text="${i + 1}"></a>
            <span th:if="${i == currentPage}" class="active" th:text="${i + 1}"></span>
        </th:block>

        <a th:if="${currentPage < totalPages - 1}"
           th:href="@{/admin/accounts(userId=${userId}, name=${name}, page=${currentPage + 1}, size=${pageSize})}">다음</a>
        <span th:if="${currentPage >= totalPages - 1}" class="disabled">다음</span>
    </div>
</div>
</body>
</html>
