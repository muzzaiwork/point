<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포인트 Admin - 포인트 건별 이력</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f6fa; color: #333; }
        .nav { background: #1a1a2e; padding: 0 24px; display: flex; align-items: center; gap: 0; }
        .nav-brand { color: #e94560; font-weight: 700; font-size: 18px; padding: 16px 24px 16px 0; border-right: 1px solid #333; margin-right: 8px; }
        .nav a { color: #aaa; text-decoration: none; padding: 16px 16px; display: inline-block; font-size: 14px; transition: color 0.2s; }
        .nav a:hover, .nav a.active { color: #fff; border-bottom: 2px solid #e94560; }
        .container { max-width: 1100px; margin: 32px auto; padding: 0 24px; }
        h2 { font-size: 20px; margin-bottom: 20px; color: #1a1a2e; }
        .search-box { background: #fff; border-radius: 8px; padding: 20px 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 24px; display: flex; gap: 12px; align-items: center; }
        .search-box input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
        .search-box input:focus { border-color: #e94560; }
        .search-box button { padding: 10px 24px; background: #e94560; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
        .search-box button:hover { background: #c73652; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        thead { background: #1a1a2e; color: #fff; }
        thead th { padding: 12px 16px; text-align: left; font-weight: 500; }
        tbody tr { border-bottom: 1px solid #f0f0f0; }
        tbody tr:hover { background: #fafafa; }
        tbody td { padding: 12px 16px; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .badge-ACCUMULATE { background: #e8f5e9; color: #2e7d32; }
        .badge-ACCUMULATE_CANCEL { background: #fce4ec; color: #c62828; }
        .badge-USE { background: #e3f2fd; color: #1565c0; }
        .badge-USE_CANCEL { background: #fff3e0; color: #e65100; }
        .badge-EXPIRE { background: #f3e5f5; color: #6a1b9a; }
        .badge-AUTO_RESTORED { background: #e0f7fa; color: #00695c; }
        .empty { text-align: center; padding: 48px; color: #aaa; font-size: 15px; }
        .amount-plus { color: #2e7d32; font-weight: 600; }
        .amount-minus { color: #c62828; font-weight: 600; }
    </style>
</head>
<body>
<nav class="nav">
    <span class="nav-brand">🎯 Point Admin</span>
    <a th:href="@{/admin/user-history}">사용자별 이력</a>
    <a th:href="@{/admin/point-history}" class="active">포인트 건별 이력</a>
    <a th:href="@{/admin/daily}">일별 집계 (정산)</a>
</nav>
<div class="container">
    <h2>포인트 건별 이력</h2>
    <div class="search-box">
        <form th:action="@{/admin/point-history}" method="get" style="display:flex;gap:12px;flex:1;align-items:center;">
            <input type="text" name="pointKey" th:value="${pointKey}" placeholder="포인트 키 입력 (예: 20260404000001)" />
            <button type="submit">조회</button>
        </form>
    </div>
    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>이벤트 타입</th>
                    <th>금액</th>
                    <th>포인트 키</th>
                    <th>주문 번호</th>
                    <th>일시</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${history == null or history.isEmpty()}">
                    <td colspan="6" class="empty">
                        <span th:if="${pointKey == null or pointKey.isBlank()}">포인트 키를 입력하고 조회하세요.</span>
                        <span th:if="${pointKey != null and !pointKey.isBlank()}">조회된 이력이 없습니다.</span>
                    </td>
                </tr>
                <tr th:each="row : ${history}">
                    <td th:text="${row.id}"></td>
                    <td>
                        <span class="badge" th:classappend="'badge-' + ${row.pointEventType}" th:text="${row.pointEventType}"></span>
                    </td>
                    <td>
                        <span th:classappend="${row.pointEventType.name().contains('CANCEL') or row.pointEventType.name() == 'USE' or row.pointEventType.name() == 'EXPIRE'} ? 'amount-minus' : 'amount-plus'"
                              th:text="${#numbers.formatInteger(row.amount, 0, 'COMMA') + 'P'}"></span>
                    </td>
                    <td th:text="${row.pointKey}"></td>
                    <td th:text="${row.orderNo != null ? row.orderNo : '-'}"></td>
                    <td th:text="${row.regDateTime}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
